<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Employee Login - SRMsolutions</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 40px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-container h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #2c3e50;
    }
    .login-form input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h2 class="logo">S<span>R</span>M<span>solutions</span></h2>
    </div>
  </header>

  <div class="login-container">
    <h1>Employee Login</h1>
    <form class="login-form" id="loginForm">
      <input type="text" id="empId" placeholder="Employee ID (EMP001)" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="login-btn">Log In</button>
    </form>
    <p style="color: #777; margin-top: 20px;">
      <small>Use your assigned credentials. Contact HR if locked out.</small>
    </p>
  </div>

  <script>
    const employees = {
      "EMP001": "admin123",
      "EMP002": "dev123",
      "EMP003": "marketing123",
      "EMP004": "content123",
      "EMP005": "ai123",
      "EMP006": "hr123"
    };

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const empId = document.getElementById("empId").value.trim();
      const password = document.getElementById("password").value;

      if (employees[empId] && employees[empId] === password) {
        localStorage.setItem("loggedInEmp", empId);
        window.location.href = "employee-dashboard.html";
      } else {
        alert("Invalid Employee ID or Password");
      }
    });
  </script>
</body>
</html>
